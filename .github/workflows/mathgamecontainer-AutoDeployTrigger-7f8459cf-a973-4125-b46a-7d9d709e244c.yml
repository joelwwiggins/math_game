name: Trigger auto deployment for mathgamecontainer

# When this action will be executed
on:
  push:
    branches: 
      [ main ]
    paths:
      - '**'
      - '.github/workflows/mathgamecontainer-AutoDeployTrigger-7f8459cf-a973-4125-b46a-7d9d709e244c.yml'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write # This is required for requesting the OIDC JWT Token
      contents: read # Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Verify containerapp.yaml file exists
        run: ls -al .github/workflows

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.MATHGAMECONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MATHGAMECONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MATHGAMECONTAINER_AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.MATHGAMECONTAINER_AZURE_CLIENT_SECRET }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: mathgameregistry.azurecr.io
          registryUsername: ${{ secrets.MATHGAMECONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MATHGAMECONTAINER_REGISTRY_PASSWORD }}
          containerAppName: mathgamecontainer
          resourceGroup: mathgameresource
          imageToBuild: mathgameregistry.azurecr.io/mathgamecontainer:${{ github.sha }}

      - name: Deploy to Azure Container Apps with YAML Config
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: mathgamecontainer
          resourceGroup: mathgameresource
          yamlConfigPath: ${{ github.workspace }}/.github/workflows/containerapp.yaml
