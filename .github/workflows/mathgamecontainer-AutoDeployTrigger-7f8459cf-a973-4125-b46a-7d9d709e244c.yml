name: Trigger auto deployment for mathgamecontainer
on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/mathgamecontainer-AutoDeployTrigger-7f8459cf-a973-4125-b46a-7d9d709e244c.yml'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.MATHGAMECONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MATHGAMECONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MATHGAMECONTAINER_AZURE_SUBSCRIPTION_ID }}
      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: mathgameregistry.azurecr.io
          registryUsername: ${{ secrets.MATHGAMECONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MATHGAMECONTAINER_REGISTRY_PASSWORD }}
          containerAppName: mathgamecontainer
          resourceGroup: mathgameresource
          imageToBuild: mathgameregistry.azurecr.io/mathgamecontainer:${{ github.sha }}
      - name: Deploy container app to Azure
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: mathgamecontainer
          resourceGroup: mathgameresource
          imageToDeploy: mathgameregistry.azurecr.io/mathgamecontainer:${{ github.sha }}
          ingress:
            external: true
            targetPort: 80
          registries:
            - server: mathgameregistry.azurecr.io
              username: ${{ secrets.MATHGAMECONTAINER_REGISTRY_USERNAME }}
              password: ${{ secrets.MATHGAMECONTAINER_REGISTRY_PASSWORD }}
          template:
            containers:
              - image: mathgameregistry.azurecr.io/mathgamecontainer:${{ github.sha }}
                name: mathgamecontainer
                env:
                  - name: DOTNET_ENVIRONMENT
                    value: Production
                  - name: WEBSITES_PORT
                    value: "80"
                  - name: AZURE_STORAGE_ACCOUNT_NAME
                    value: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
                  - name: AZURE_STORAGE_ACCOUNT_KEY
                    value: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
                  - name: FILE_SHARE_NAME
                    value: ${{ secrets.FILE_SHARE_NAME }}
                volumeMounts:
                  - mountPath: /mnt/azure
                    volumeName: azure-file-share
          scale:
            minReplicas: 1
            maxReplicas: 1
          volumes:
            - name: azure-file-share
              azureFile:
                shareName: ${{ secrets.FILE_SHARE_NAME }}
                storageAccountName: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
                storageAccountKey: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}